<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI System Library</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>AI System Library</h1>
  <p>Hazır AI agent ve skill paketlerini indirerek projelerinizi hızla kurun.</p>
</header>

<main>
  <section id="assets">
    <!-- Paketler buraya JS ile yüklenecek -->
  </section>
</main>

<footer>
  <p>&copy; 2026 Ahmet. Tüm hakları saklıdır.</p>
</footer>

<script>
fetch('./data/assets.json')
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById('assets');

    data.forEach(item => {
      const div = document.createElement('div');
      div.className = "asset";

      div.innerHTML = `
        <h2>${item.title}</h2>
        <p>${item.description}</p>
        <p><strong>Kategori:</strong> ${item.category} | <strong>Seviye:</strong> ${item.level}</p>
        <a href="./pages/asset.html?id=${item.id}">Detay ve indir</a>
      `;

      container.appendChild(div);
    });
  })
  .catch(err => console.error('Asset yüklenemedi', err));
</script>

</body>
</html>
