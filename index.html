<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI System Library — Agents & Skills Catalog</title>
  <meta name="description" content="Production-ready AI agent and skill packages." />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%237c6af5'/><text x='16' y='22' text-anchor='middle' font-family='monospace' font-size='16' font-weight='500' fill='white'>AI</text></svg>" />
</head>
<body>

  <header>
    <div class="header-inner">
      <a class="logo" href="index.html">
        <div class="logo-mark">AI</div>
        <span class="logo-text">System<span> Library</span></span>
      </a>
      <nav class="header-nav">
        <a href="#">Agents</a>
        <a href="#">Skills</a>
        <a href="#">Docs</a>
        <a href="#" class="header-cta">Submit Asset</a>
      </nav>
    </div>
  </header>

  <div id="catalog-view">

    <section class="hero">
      <div class="hero-inner">
        <div class="hero-eyebrow">Open Catalog</div>
        <h1>Production-ready <em>AI components</em></h1>
        <p class="hero-sub">Agents and skills you can drop into real systems. No toy demos.</p>

        <div class="hero-search-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="hero-search-icon">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="search" id="search" placeholder="Search agents, skills, tags…" autocomplete="off" spellcheck="false" />
        </div>

        <div class="filter-row">
          <div class="filter-group">
            <span class="filter-label">Category</span>
            <div class="pill-group" id="pill-category">
              <button class="pill active" data-value="">All</button>
              <button class="pill" data-value="agent">Agents</button>
              <button class="pill" data-value="skill">Skills</button>
            </div>
          </div>
          <div class="filter-divider"></div>
          <div class="filter-group">
            <span class="filter-label">Level</span>
            <div class="pill-group" id="pill-level">
              <button class="pill active" data-value="">All</button>
              <button class="pill" data-value="beginner">Beginner</button>
              <button class="pill" data-value="intermediate">Intermediate</button>
              <button class="pill" data-value="advanced">Advanced</button>
            </div>
          </div>
          <div class="filter-divider"></div>
          <div class="filter-group">
            <span class="filter-label">Sort</span>
            <div class="pill-group" id="pill-sort">
              <button class="pill active" data-value="downloads">Popular</button>
              <button class="pill" data-value="newest">Newest</button>
              <button class="pill" data-value="title">A–Z</button>
            </div>
          </div>
        </div>

        <div class="stats-row">
          <div class="stat-item">
            <span class="stat-value" id="stat-total">—</span>
            <span class="stat-label">Assets</span>
          </div>
          <div class="stat-dot"></div>
          <div class="stat-item">
            <span class="stat-value" id="stat-agents">—</span>
            <span class="stat-label">Agents</span>
          </div>
          <div class="stat-dot"></div>
          <div class="stat-item">
            <span class="stat-value" id="stat-skills">—</span>
            <span class="stat-label">Skills</span>
          </div>
          <div class="stat-dot"></div>
          <div class="stat-item">
            <span class="stat-value" id="stat-downloads">—</span>
            <span class="stat-label">Downloads</span>
          </div>
          <div class="stat-sep"></div>
          <span class="results-count" id="results-count"></span>
        </div>
      </div>
    </section>

    <section class="catalog">
      <div class="grid" id="grid">
        <div class="card" style="opacity:0.3;pointer-events:none;">
          <div class="skeleton" style="width:100px;height:18px;margin-bottom:16px;border-radius:4px;"></div>
          <div class="skeleton" style="width:70%;height:16px;margin-bottom:10px;border-radius:4px;"></div>
          <div class="skeleton" style="height:48px;border-radius:4px;"></div>
        </div>
        <div class="card" style="opacity:0.18;pointer-events:none;">
          <div class="skeleton" style="width:100px;height:18px;margin-bottom:16px;border-radius:4px;"></div>
          <div class="skeleton" style="width:80%;height:16px;margin-bottom:10px;border-radius:4px;"></div>
          <div class="skeleton" style="height:48px;border-radius:4px;"></div>
        </div>
        <div class="card" style="opacity:0.08;pointer-events:none;">
          <div class="skeleton" style="width:100px;height:18px;margin-bottom:16px;border-radius:4px;"></div>
          <div class="skeleton" style="width:60%;height:16px;margin-bottom:10px;border-radius:4px;"></div>
          <div class="skeleton" style="height:48px;border-radius:4px;"></div>
        </div>
      </div>
    </section>

  </div>

  <div id="detail-view" style="display:none;"></div>

  <footer>
    <div class="footer-inner">
      <span class="footer-copy">© 2025 AI System Library</span>
      <nav class="footer-links">
        <a href="#">GitHub</a>
        <a href="#">Docs</a>
        <a href="#">Submit Asset</a>
      </nav>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
